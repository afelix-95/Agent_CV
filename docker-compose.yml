services:

  # ── Traefik reverse proxy (TLS termination via Let's Encrypt) ────────────────
  traefik:
    image: traefik:v3.3
    restart: unless-stopped
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt

  # ── PostgreSQL with pgvector ─────────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres        # override in .env on the server
      POSTGRES_DB: agent_cv
    volumes:
      - pg_data:/var/lib/postgresql/data
      # SQL files are executed in alphabetical order on first run
      - ./sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agent_cv"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI application ──────────────────────────────────────────────────────
  app:
    image: amaia95/agents:latest
    restart: unless-stopped
    env_file: .env
    environment:
      # Override DSN so it points to the db service, not localhost
      POSTGRES_DSN: postgresql://postgres:postgres@db:5432/agent_cv
    volumes:
      # Mount the CV PDF folder from the host so files persist across deploys
      - ./PDFs:/app/PDFs
    depends_on:
      db:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.app.entrypoints=websecure"
      - "traefik.http.routers.app.tls.certresolver=letsencrypt"
      - "traefik.http.services.app.loadbalancer.server.port=8000"

volumes:
  pg_data:
  letsencrypt:
