services:

  # ── PostgreSQL with pgvector ─────────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres        # override in .env on the server
      POSTGRES_DB: agent_cv
    volumes:
      - pg_data:/var/lib/postgresql/data
      # SQL files are executed in alphabetical order on first run
      - ./sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agent_cv"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI application ──────────────────────────────────────────────────────
  app:
    image: amaia95/agents:latest
    restart: unless-stopped
    env_file: .env
    environment:
      # Override DSN so it points to the db service, not localhost
      POSTGRES_DSN: postgresql://postgres:postgres@db:5432/agent_cv
    volumes:
      # Mount the CV PDF folder from the host so files persist across deploys
      - ./PDFs:/app/PDFs
    depends_on:
      db:
        condition: service_healthy
    networks:
      - default
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK:-traefik-public}"
      # Dedicated high-priority routers for each app path — avoids conflict
      # with other containers registered on the same hostname (e.g. n8n chatbot)
      - "traefik.http.routers.agent-cv-webhook.rule=Host(`${APP_DOMAIN}`) && PathPrefix(`/graph-notifications`)"
      - "traefik.http.routers.agent-cv-webhook.entrypoints=websecure"
      - "traefik.http.routers.agent-cv-webhook.tls=true"
      - "traefik.http.routers.agent-cv-webhook.service=agent-cv"
      - "traefik.http.routers.agent-cv-webhook.priority=100"
      - "traefik.http.routers.agent-cv-api.rule=Host(`${APP_DOMAIN}`) && (PathPrefix(`/admin`) || PathPrefix(`/query`) || PathPrefix(`/teams`) || PathPrefix(`/health`) || PathPrefix(`/employees`) || PathPrefix(`/docs`) || PathPrefix(`/openapi`))"
      - "traefik.http.routers.agent-cv-api.entrypoints=websecure"
      - "traefik.http.routers.agent-cv-api.tls=true"
      - "traefik.http.routers.agent-cv-api.service=agent-cv"
      - "traefik.http.routers.agent-cv-api.priority=50"
      - "traefik.http.services.agent-cv.loadbalancer.server.port=8000"

networks:
  default: {}
  traefik:
    external: true
    name: ${TRAEFIK_NETWORK:-traefik-public}

volumes:
  pg_data:
